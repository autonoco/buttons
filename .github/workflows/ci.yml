name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Go toolchain. Bumping this also resolves stdlib CVEs
  # tracked in autonoco/autono#331. 1.26.4 clears four reachable
  # vulnerabilities that 1.26.2 is exposed to: GO-2026-4918 (net/http
  # HTTP/2 infinite loop) and GO-2026-4971 (net) fixed in 1.26.3, plus
  # GO-2026-5037 (crypto/x509) and GO-2026-5039 (net/textproto) fixed
  # in 1.26.4.
  GO_VERSION: "1.26.4"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify module integrity
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests (with race detector)
        run: go test -race -count=1 ./internal/...

      - name: Integration tests
        run: go test -count=1 ./test/integration/...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        # Pinned so Dependabot (or a follow-up PR) can bump it intentionally.
        # v1.4.0 bundles x/tools v0.46.0, which panics ("ForEachElement called
        # on type containing *types.TypeParam") during symbol-level analysis of
        # generics under Go 1.26. Bump once upstream ships the x/tools fix.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: govulncheck ./...

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Pinned so Dependabot (or a follow-up PR) can bump it intentionally.
      # gitleaks-action@v2 requires a license for private repos, so we
      # install the binary directly instead — free regardless of repo
      # visibility and also faster.
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history so gitleaks can scan every commit.

      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks gitleaks.tar.gz
          gitleaks version

      - name: Scan repository
        run: gitleaks detect --source . --verbose --redact --no-banner

  build-release:
    name: Build (release ldflags)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Tags + full history so `git describe` works.

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build with version injection (make build)
        run: make build

      - name: Smoke test binary
        run: ./buttons --help
