name: Sync docs

# Runs after every push to main. If any cmd/ or internal/ files
# changed, regenerates the CLI reference docs and SKILL.md from
# the Cobra command tree. If the generated files differ from what's
# on main, opens a PR with the updates.
#
# This means developers never have to run `make docs` or `make skill`
# manually — CI does it and the update lands as a reviewable PR.

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Makefile'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-docs:
    name: Regenerate CLI docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Regenerate CLI reference + SKILL.md
        run: |
          go run ./internal/tools/docgen -out ./docs/cli -format markdown -frontmatter
          go run ./internal/tools/skillgen -out ./.agents/skills/buttons/SKILL.md

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/cli/ .agents/skills/buttons/SKILL.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updates
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="chore/auto-sync-docs-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/cli/ .agents/skills/buttons/SKILL.md
          git commit -m "chore: auto-sync CLI docs and SKILL.md [skip release]"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-sync CLI docs from latest command changes" \
            --body "$(cat <<'BODY'
          ## Auto-generated PR

          The CLI source code changed on main and the generated documentation
          is now out of sync. This PR updates:

          - `docs/cli/*.md` — Mintlify CLI reference pages (from Cobra docgen)
          - `.agents/skills/buttons/SKILL.md` — agent skill file (from skillgen)

          Both are regenerated from the Cobra command tree via:

          ```bash
          go run ./internal/tools/docgen -out ./docs/cli
          go run ./internal/tools/skillgen -out ./.agents/skills/buttons/SKILL.md
          ```

          Review the diff to confirm the changes match the CLI updates that triggered this.

          🤖 Auto-generated by the [docs-sync workflow](/.github/workflows/docs-sync.yml).
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
